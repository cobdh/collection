---
version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(dependabot)"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"  # main Dockerfile
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 5

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"  # workflows are under .github/workflows
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 10
